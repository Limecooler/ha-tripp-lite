name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Validate metadata files
        run: |
          python - <<'PY'
          import json
          import pathlib
          import tomllib
          import yaml

          root = pathlib.Path("custom_components/tripp_lite_webcardlx")
          for name in ("manifest.json", "strings.json", "icons.json"):
              json.loads((root / name).read_text())
          for path in (root / "translations").glob("*.json"):
              json.loads(path.read_text())
          for name in ("services.yaml", "quality_scale.yaml"):
              yaml.safe_load((root / name).read_text())
          tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          PY
      - name: Ruff
        run: ruff check custom_components/tripp_lite_webcardlx tests/components/tripp_lite_webcardlx
      - name: Compile
        run: python -m compileall custom_components/tripp_lite_webcardlx tests/components/tripp_lite_webcardlx
      - name: Tests
        run: pytest tests/components/tripp_lite_webcardlx
